name: MovieCompanion
options:
  bundleIdPrefix: com.moviecompanion
  deploymentTarget:
    iOS: "16.0"

targets:
  MovieCompanion:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - MovieCompanion
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.moviecompanion.app
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
    info:
      path: MovieCompanion/Info.plist
      properties:
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleDisplayName: MovieCompanion
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
