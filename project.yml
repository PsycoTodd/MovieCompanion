name: MovieCompanion
options:
  bundleIdPrefix: com.moviecompanion
  deploymentTarget:
    iOS: "16.0"

targets:
  MovieCompanion:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - MovieCompanion
    dependencies:
      - sdk: Speech.framework
      - sdk: AVFoundation.framework
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.moviecompanion.app
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
    info:
      path: MovieCompanion/Info.plist
      properties:
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleDisplayName: MovieCompanion
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSMicrophoneUsageDescription: "MovieCompanion listens to the movie audio to automatically sync subtitles to the current scene."
        NSSpeechRecognitionUsageDescription: "MovieCompanion uses speech recognition to match dialogue to the correct subtitle line."
